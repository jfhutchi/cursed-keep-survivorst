name: Deploy Web Build to GitHub Pages

on:
  push:
    branches: [master, fable5_test]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Only one Pages deployment at a time; let in-flight production deploys finish.
concurrency:
  group: pages
  cancel-in-progress: false

env:
  GODOT_VERSION: 4.6.3-stable

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache Godot editor and export templates
        id: godot-cache
        uses: actions/cache@v4
        with:
          path: |
            ~/godot-bin
            ~/.local/share/godot/export_templates
          key: godot-${{ env.GODOT_VERSION }}-linux

      - name: Download Godot editor + export templates
        if: steps.godot-cache.outputs.cache-hit != 'true'
        run: |
          set -euo pipefail
          mkdir -p ~/godot-bin ~/.local/share/godot/export_templates
          curl -fsSL -o /tmp/godot.zip \
            "https://github.com/godotengine/godot/releases/download/${GODOT_VERSION}/Godot_v${GODOT_VERSION}_linux.x86_64.zip"
          unzip -q /tmp/godot.zip -d ~/godot-bin
          mv ~/godot-bin/Godot_v${GODOT_VERSION}_linux.x86_64 ~/godot-bin/godot
          chmod +x ~/godot-bin/godot
          curl -fsSL -o /tmp/templates.tpz \
            "https://github.com/godotengine/godot/releases/download/${GODOT_VERSION}/Godot_v${GODOT_VERSION}_export_templates.tpz"
          unzip -q /tmp/templates.tpz -d /tmp/tpl
          version_dir="${GODOT_VERSION/-/.}"   # 4.6.3-stable -> 4.6.3.stable
          mv /tmp/tpl/templates ~/.local/share/godot/export_templates/"$version_dir"

      - name: Import project (first scan / asset import)
        run: ~/godot-bin/godot --headless --path . --import

      - name: Validate project data
        run: ~/godot-bin/godot --headless --path . --script res://scripts/tools/validate_project.gd

      - name: Export Web build
        run: |
          set -euo pipefail
          mkdir -p build/web
          ~/godot-bin/godot --headless --path . --export-release "Web" build/web/index.html
          test -f build/web/index.html
          test -f build/web/index.wasm
          test -f build/web/index.pck

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: build/web

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
