<svg width="96" height="112" viewBox="0 0 96 112" xmlns="http://www.w3.org/2000/svg">
  <!-- The Cursed Castellan, Heart of the Keep. Final boss. Original art. -->
  <defs>
    <linearGradient id="mantle" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#4a3a78"/>
      <stop offset="1" stop-color="#241a40"/>
    </linearGradient>
    <linearGradient id="armor" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#6a6480"/>
      <stop offset="1" stop-color="#322e44"/>
    </linearGradient>
    <radialGradient id="heart" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#ffd2e8"/>
      <stop offset="0.45" stop-color="#d86bff"/>
      <stop offset="1" stop-color="#d86bff" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <!-- torn mantle / cape -->
  <path d="M48 14 L82 30 L86 86 L74 78 L70 96 L60 84 L54 102 L48 88 L42 102 L36 84 L26 96 L22 78 L10 86 L14 30 Z" fill="url(#mantle)" stroke="#140e28" stroke-width="2"/>
  <!-- battlement shoulders: the castle itself grows from him -->
  <path d="M10 32 L10 24 L16 24 L16 28 L22 28 L22 22 L28 22 L28 30 L20 36 Z" fill="#3a3552" stroke="#140e28" stroke-width="1.6"/>
  <path d="M86 32 L86 24 L80 24 L80 28 L74 28 L74 22 L68 22 L68 30 L76 36 Z" fill="#3a3552" stroke="#140e28" stroke-width="1.6"/>
  <!-- cuirass -->
  <path d="M48 22 L66 32 L64 70 L48 80 L32 70 L30 32 Z" fill="url(#armor)" stroke="#140e28" stroke-width="2"/>
  <path d="M36 40 L60 40 M37 50 L59 50 M39 60 L57 60" stroke="#211d34" stroke-width="1.6"/>
  <!-- the exposed cursed heart -->
  <circle cx="48" cy="50" r="16" fill="url(#heart)"/>
  <path d="M48 42 C52 42 55 46 54 50 C53.4 53.4 50 56 48 58 C46 56 42.6 53.4 42 50 C41 46 44 42 48 42 Z" fill="#e84a9a" stroke="#5d1238" stroke-width="1.6"/>
  <path d="M45 47 C46 45.6 48 45.4 49 46.4" stroke="#ffc2dd" stroke-width="1.4" fill="none"/>
  <!-- crowned great helm -->
  <path d="M36 6 L60 6 L62 20 L56 25 L40 25 L34 20 Z" fill="#565070" stroke="#140e28" stroke-width="2"/>
  <path d="M36 6 L36 0 L41 4 L46 0 L50 4 L55 0 L60 6" fill="#d8b25a" stroke="#5d4a1e" stroke-width="1.4"/>
  <rect x="39" y="12" width="18" height="5" rx="2" fill="#0a0716"/>
  <circle cx="44" cy="14.5" r="1.7" fill="#d86bff"/>
  <circle cx="52" cy="14.5" r="1.7" fill="#d86bff"/>
  <!-- gauntlets -->
  <ellipse cx="12" cy="56" rx="7" ry="8.5" fill="#565070" stroke="#140e28" stroke-width="1.8"/>
  <path d="M8 52 L16 52 M8 57 L16 57 M9 62 L15 62" stroke="#211d34" stroke-width="1.3"/>
  <ellipse cx="84" cy="56" rx="7" ry="8.5" fill="#565070" stroke="#140e28" stroke-width="1.8"/>
  <path d="M80 52 L88 52 M80 57 L88 57 M81 62 L87 62" stroke="#211d34" stroke-width="1.3"/>
  <!-- chains hanging from the arms -->
  <path d="M12 64 C11 70 13 74 11 79 M84 64 C85 70 83 74 85 79" stroke="#8a8498" stroke-width="2" fill="none" stroke-dasharray="3 2.4"/>
</svg>
