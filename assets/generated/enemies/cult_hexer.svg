<svg width="30" height="40" viewBox="0 0 30 40" xmlns="http://www.w3.org/2000/svg">
  <!-- Cult Hexer: robed caster of curse-light. Original art. -->
  <defs>
    <linearGradient id="robe" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#5d4a8a"/>
      <stop offset="1" stop-color="#2e2348"/>
    </linearGradient>
  </defs>
  <!-- robe -->
  <path d="M15 4 L23 12 L25 36 L19 33 L15 38 L11 33 L5 36 L7 12 Z" fill="url(#robe)" stroke="#191230" stroke-width="1.4"/>
  <!-- rune hem -->
  <path d="M7 30 L23 30" stroke="#c89aff" stroke-width="1" stroke-dasharray="2 2"/>
  <!-- deep hood -->
  <path d="M15 2 C10 3.5 8 8 9 12 C12 9.5 18 9.5 21 12 C22 8 20 3.5 15 2 Z" fill="#3c2f60" stroke="#191230" stroke-width="1.4"/>
  <ellipse cx="15" cy="10.5" rx="4.6" ry="3.8" fill="#0c0818"/>
  <!-- single cyclopean glow -->
  <circle cx="15" cy="10.2" r="1.7" fill="#d8a9ff"/>
  <!-- staff with hex orb -->
  <path d="M25.5 8 L24 30" stroke="#6a5638" stroke-width="1.8"/>
  <circle cx="25.8" cy="6.4" r="3" fill="#1c1230" stroke="#c89aff" stroke-width="1.2"/>
  <circle cx="25.8" cy="6.4" r="1.2" fill="#d8a9ff"/>
  <!-- casting hand glyph -->
  <circle cx="5.5" cy="18" r="2.4" fill="none" stroke="#c89aff" stroke-width="1.1"/>
  <path d="M4.3 18 L6.7 18 M5.5 16.8 L5.5 19.2" stroke="#c89aff" stroke-width="0.9"/>
</svg>
