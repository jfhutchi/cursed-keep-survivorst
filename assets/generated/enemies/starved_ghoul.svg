<svg width="26" height="36" viewBox="0 0 26 36" xmlns="http://www.w3.org/2000/svg">
  <!-- Starved Ghoul: thin, fast, hungry. Original art. -->
  <defs>
    <linearGradient id="skin" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#9fae8e"/>
      <stop offset="1" stop-color="#5d6b4f"/>
    </linearGradient>
  </defs>
  <!-- hunched body -->
  <path d="M13 6 C19 7 21 13 20 20 C19.5 26 17 31 13 34 C9 31 6.5 26 6 20 C5 13 7 7 13 6 Z" fill="url(#skin)" stroke="#2e3526" stroke-width="1.4"/>
  <!-- ribs showing -->
  <path d="M9 18 L17 18 M9 21 L17 21 M9.5 24 L16.5 24" stroke="#3f4a33" stroke-width="1.1"/>
  <!-- gaunt head -->
  <ellipse cx="13" cy="8.5" rx="5.4" ry="5" fill="#aab89a" stroke="#2e3526" stroke-width="1.4"/>
  <!-- sunken eyes -->
  <circle cx="10.8" cy="8" r="1.6" fill="#141a0e"/>
  <circle cx="15.2" cy="8" r="1.6" fill="#141a0e"/>
  <circle cx="10.8" cy="8" r="0.7" fill="#ffd24a"/>
  <circle cx="15.2" cy="8" r="0.7" fill="#ffd24a"/>
  <!-- open maw -->
  <path d="M10.5 11.5 Q13 14 15.5 11.5 L15 13.4 Q13 15.2 11 13.4 Z" fill="#1d1410"/>
  <!-- claw arms -->
  <path d="M7 15 L1.5 21 M2.8 19 L1.5 21 L3.6 21.8" stroke="#7c8a6c" stroke-width="1.8" fill="none" stroke-linecap="round"/>
  <path d="M19 15 L24.5 21 M23.2 19 L24.5 21 L22.4 21.8" stroke="#7c8a6c" stroke-width="1.8" fill="none" stroke-linecap="round"/>
</svg>
