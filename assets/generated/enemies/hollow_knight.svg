<svg width="40" height="46" viewBox="0 0 40 46" xmlns="http://www.w3.org/2000/svg">
  <!-- Hollow Knight: empty armor that remembers war. Original art. -->
  <defs>
    <linearGradient id="plate" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#9aa4b8"/>
      <stop offset="1" stop-color="#525c70"/>
    </linearGradient>
  </defs>
  <!-- cuirass -->
  <path d="M20 12 L30 16 L29 34 L24 40 L16 40 L11 34 L10 16 Z" fill="url(#plate)" stroke="#23283a" stroke-width="1.6"/>
  <path d="M20 14 L20 38" stroke="#3a4256" stroke-width="1.4"/>
  <path d="M12 22 L28 22 M13 28 L27 28" stroke="#3a4256" stroke-width="1.2"/>
  <!-- great helm, hollow -->
  <path d="M13 4 L27 4 L28 13 L24 16 L16 16 L12 13 Z" fill="#7a8498" stroke="#23283a" stroke-width="1.6"/>
  <rect x="14.5" y="8" width="11" height="3.4" rx="1.5" fill="#0b0d18"/>
  <circle cx="17.4" cy="9.7" r="1" fill="#ff8c5a"/>
  <circle cx="22.6" cy="9.7" r="1" fill="#ff8c5a"/>
  <path d="M20 4 L20 1" stroke="#8a4a4a" stroke-width="2"/>
  <path d="M18 1.5 L22 1.5" stroke="#8a4a4a" stroke-width="1.4"/>
  <!-- pauldrons -->
  <path d="M9 15 L15 13 L14 21 L8 20 Z" fill="#8a94a8" stroke="#23283a" stroke-width="1.3"/>
  <path d="M31 15 L25 13 L26 21 L32 20 Z" fill="#8a94a8" stroke="#23283a" stroke-width="1.3"/>
  <!-- jagged greatblade -->
  <path d="M33 18 L38 40 L34.5 38.5 L33.5 42 Z" fill="#b8c2d4" stroke="#23283a" stroke-width="1.2"/>
  <!-- shield arm -->
  <path d="M7 20 L3 24 L4 32 L8 34 L9 26 Z" fill="#5d6678" stroke="#23283a" stroke-width="1.3"/>
  <circle cx="6" cy="27" r="1.6" fill="none" stroke="#ff8c5a" stroke-width="1"/>
</svg>
