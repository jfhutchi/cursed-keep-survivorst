<svg width="72" height="40" viewBox="0 0 72 40" xmlns="http://www.w3.org/2000/svg">
  <!-- Blood Scythe sweep blade, points +x. Original art. -->
  <defs>
    <linearGradient id="edge" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#7c1f2a" stop-opacity="0.1"/>
      <stop offset="0.55" stop-color="#ff5d6c"/>
      <stop offset="1" stop-color="#ffd2d8"/>
    </linearGradient>
  </defs>
  <!-- crescent slash blade -->
  <path d="M2 36 C20 32 48 26 70 8 C58 8 34 10 16 20 C8 24 3 30 2 36 Z" fill="url(#edge)"/>
  <!-- bright cutting edge -->
  <path d="M2 36 C24 30 50 23 70 8" stroke="#ffe8ec" stroke-width="2.2" fill="none" stroke-opacity="0.95"/>
  <!-- blood droplets flying off -->
  <circle cx="30" cy="14" r="1.8" fill="#ff5d6c"/>
  <circle cx="46" cy="9" r="1.4" fill="#ff8d99"/>
  <circle cx="60" cy="4" r="1.2" fill="#ffb3bb"/>
  <path d="M22 18 C21 16 21.4 14.6 23 14" stroke="#ff5d6c" stroke-width="1.2" fill="none"/>
</svg>
