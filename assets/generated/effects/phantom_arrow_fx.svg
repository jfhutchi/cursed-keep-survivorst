    <linearGradient id="shaft" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#9ec4d8" stop-opacity="0.15"/>
      <stop offset="0.6" stop-color="#d8f4ff" stop-opacity="0.9"/>
