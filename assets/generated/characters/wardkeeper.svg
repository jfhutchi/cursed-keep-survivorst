<svg width="40" height="46" viewBox="0 0 40 46" xmlns="http://www.w3.org/2000/svg">
  <!-- The Wardkeeper: hooded guardian with relic lantern. Original art. -->
  <defs>
    <linearGradient id="cloak" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#3a3357"/>
      <stop offset="1" stop-color="#1d1830"/>
    </linearGradient>
    <radialGradient id="lantern" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#bfe9ff"/>
      <stop offset="0.5" stop-color="#7fd4ff"/>
      <stop offset="1" stop-color="#7fd4ff" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <!-- cloak body -->
  <path d="M20 4 L31 12 L33 34 L28 42 L12 42 L7 34 L9 12 Z" fill="url(#cloak)" stroke="#0e0b18" stroke-width="1.5"/>
  <!-- gold trim -->
  <path d="M9 13 L20 6 L31 13" fill="none" stroke="#d8b25a" stroke-width="1.6"/>
  <path d="M12 41 L28 41" fill="none" stroke="#d8b25a" stroke-width="1.4"/>
  <!-- hood -->
  <path d="M20 2 C13 4 10 9 11 14 C14 11 26 11 29 14 C30 9 27 4 20 2 Z" fill="#2b2546" stroke="#0e0b18" stroke-width="1.5"/>
  <!-- face shadow + eyes -->
  <ellipse cx="20" cy="13.5" rx="6.4" ry="4.6" fill="#0a0814"/>
  <circle cx="17.4" cy="13.4" r="1.3" fill="#9fe2ff"/>
  <circle cx="22.6" cy="13.4" r="1.3" fill="#9fe2ff"/>
  <!-- shoulder pauldrons -->
  <path d="M7 15 L13 13 L12 20 L7 19 Z" fill="#4a4070" stroke="#0e0b18" stroke-width="1.2"/>
  <path d="M33 15 L27 13 L28 20 L33 19 Z" fill="#4a4070" stroke="#0e0b18" stroke-width="1.2"/>
  <!-- chest sigil -->
  <circle cx="20" cy="24" r="4.6" fill="#141026" stroke="#d8b25a" stroke-width="1.2"/>
  <path d="M20 20.4 L21.6 24 L20 27.6 L18.4 24 Z" fill="#7fd4ff"/>
  <!-- lantern hand -->
  <circle cx="32.5" cy="27" r="6.5" fill="url(#lantern)"/>
  <rect x="30.4" y="23.5" width="4.2" height="6.4" rx="1.4" fill="#1a1530" stroke="#d8b25a" stroke-width="1.1"/>
  <circle cx="32.5" cy="26.7" r="1.5" fill="#cfeeff"/>
  <!-- belt -->
  <path d="M11 30 L29 30" stroke="#6a5a3a" stroke-width="2.2"/>
  <circle cx="20" cy="30" r="1.6" fill="#d8b25a"/>
</svg>
